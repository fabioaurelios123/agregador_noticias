services:

  # ── Aplicação principal ─────────────────────────────────────────────────────
  brasil24:
    build: .
    container_name: brasil24
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Banco de dados SQLite (persistente entre reinicializações)
      - brasil24_db:/app/database
      # Vídeos gerados
      - brasil24_videos:/app/video/output
      # Trilha de fundo opcional: coloque bg_music.mp3 aqui
      - brasil24_assets:/app/video/assets
    restart: unless-stopped
    # Permite que o container acesse o Ollama rodando no host (Linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Ollama (IA local, gratuita) ─────────────────────────────────────────────
  # Ativado apenas com: docker compose --profile ollama up
  # Após subir, baixe o modelo: docker compose exec ollama ollama pull llama3.2
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    profiles: [ollama]
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Para usar GPU NVIDIA, descomente as linhas abaixo:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

# ── Volumes nomeados ────────────────────────────────────────────────────────
volumes:
  brasil24_db:
    name: brasil24_db
  brasil24_videos:
    name: brasil24_videos
  brasil24_assets:
    name: brasil24_assets
  ollama_data:
    name: ollama_data
